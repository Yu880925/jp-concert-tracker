name: Concert Monitor Scan

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.RENDER_URL }}" ]; then echo "❌ RENDER_URL secret 未設定"; exit 1; fi
          if [ -z "${{ secrets.SCAN_API_KEY }}" ]; then echo "❌ SCAN_API_KEY secret 未設定"; exit 1; fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then echo "❌ GROQ_API_KEY secret 未設定"; exit 1; fi
          echo "✓ Secrets 已設定"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wake Render & download database
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          SCAN_API_KEY: ${{ secrets.SCAN_API_KEY }}
          DB_PATH: concerts.db
        run: python scripts/gha_sync.py download
        continue-on-error: true

      - name: Initialize database if missing
        env:
          DB_PATH: concerts.db
        run: python -c "from database import init_db; init_db()"

      - name: Run monitor scan
        env:
          DB_PATH: concerts.db
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python monitor.py --prefer nitter

      - name: Backup database (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: concerts-db-${{ github.run_id }}
          path: concerts.db
          retention-days: 7

      - name: Wake Render & upload database
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          SCAN_API_KEY: ${{ secrets.SCAN_API_KEY }}
          DB_PATH: concerts.db
        run: python scripts/gha_sync.py upload
