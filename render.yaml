# Render Blueprint — 在 Render Dashboard 選「New > Blueprint」匯入此檔
services:
  - type: web
    name: jp-concert-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/stats
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DB_PATH
        value: /var/data/concerts.db
      - key: ENABLE_PUBLIC_SCAN
        value: "false"
      - key: SCAN_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: concerts-data
      mountPath: /var/data
      sizeGB: 1
