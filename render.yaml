# Render Blueprint — 免費方案（不支援 Persistent Disk）
# 資料庫由 GitHub Actions 掃描後透過 /api/sync-db 上傳同步
services:
  - type: web
    name: jp-concert-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/stats
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DB_PATH
        value: concerts.db
      - key: ENABLE_PUBLIC_SCAN
        value: "false"
      - key: SCAN_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
