name: Concert Monitor Scan

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.RENDER_URL }}" ]; then echo "❌ RENDER_URL secret 未設定"; exit 1; fi
          if [ -z "${{ secrets.SCAN_API_KEY }}" ]; then echo "❌ SCAN_API_KEY secret 未設定"; exit 1; fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then echo "❌ GROQ_API_KEY secret 未設定"; exit 1; fi
          echo "✓ Secrets 已設定"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 啟動臨時 SearXNG（僅本次 job 使用，跟本機 Docker Desktop 無關）
        run: |
          mkdir -p searxng-config
          cat > searxng-config/settings.yml << 'EOF'
          use_default_settings: true
          server:
            secret_key: "${{ secrets.SEARXNG_SECRET_KEY }}"
          search:
            formats:
              - html
              - json
          EOF
          docker run -d --name searxng -p 8080:8080 \
            -v ${{ github.workspace }}/searxng-config:/etc/searxng \
            searxng/searxng:latest

          echo "等待 SearXNG 啟動..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "✓ SearXNG 已就緒"
              break
            fi
            sleep 2
          done

      - name: Wake Render & download database
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          SCAN_API_KEY: ${{ secrets.SCAN_API_KEY }}
          DB_PATH: concerts.db
        run: python scripts/gha_sync.py download
        continue-on-error: true

      - name: Initialize database if missing
        env:
          DB_PATH: concerts.db
        run: python -c "from database import init_db; init_db()"

      - name: Run monitor scan
        env:
          DB_PATH: concerts.db
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LOCAL_SEARXNG_URL: http://localhost:8080
        run: python monitor.py --prefer nitter

      - name: Backup database (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: concerts-db-${{ github.run_id }}
          path: concerts.db
          retention-days: 7

      - name: Wake Render & upload database
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          SCAN_API_KEY: ${{ secrets.SCAN_API_KEY }}
          DB_PATH: concerts.db
        run: python scripts/gha_sync.py upload
